<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>ThreadLink — Mobile: Onboarding &amp; Invite</title>
<style>
  body { margin:0; padding:40px; background:#F0F0EE; font-family:-apple-system,Helvetica,Arial,sans-serif; display:flex; justify-content:center; }
  .caption { text-align:center; color:#8A8578; font-size:13px; margin-bottom:16px; }
  .phone { width:390px; min-height:844px; background:#FAFAF8; border-radius:24px; box-shadow:0 8px 30px rgba(0,0,0,0.12); overflow:hidden; padding:64px 24px 0; box-sizing:border-box; display:flex; flex-direction:column; gap:16px; }
  .title { font-size:24px; font-weight:700; color:#1A1A1A; }
  .subtitle { font-size:15px; color:#8A8578; }
  .input { background:#fff; border:1px solid #EFEFEF; border-radius:12px; padding:12px 14px; font-size:15px; color:#1A1A1A; }
  .invitecard { background:#fff; border:1px solid #EFEFEF; border-radius:16px; padding:24px 20px; text-align:center; }
  .invitelabel { font-size:13px; color:#8A8578; margin-bottom:6px; }
  .invitecode { font-size:24px; font-weight:600; color:#1A1A1A; letter-spacing:2px; }
  .sharebtn { background:#C4703F; color:#fff; border-radius:999px; text-align:center; padding:12px; font-size:15px; font-weight:500; }
  .skip { text-align:center; font-size:13px; color:#8A8578; }
</style>
</head>
<body>
<div>
  <div class="caption">Mobile — Onboarding &amp; Invite (matches the Figma "Screen / Onboarding Invite" frame)</div>
  <div class="phone">
    <div class="title">Buat ruang berdua</div>
    <div class="subtitle">Nama ruang ini akan terlihat oleh kalian berdua.</div>
    <div class="input">You &amp; Ardi</div>
    <div class="invitecard">
      <div class="invitelabel">Kode undangan</div>
      <div class="invitecode">XK4 9F2</div>
    </div>
    <div class="sharebtn">Bagikan link undangan</div>
    <div class="skip">Lewati untuk sekarang</div>
  </div>
</div>
</body>
</html>
