<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>ThreadLink — Web: Bookmarks &amp; Tags</title>
<style>
  body { margin:0; padding:40px; background:#F0F0EE; font-family:-apple-system,Helvetica,Arial,sans-serif; }
  .caption { text-align:center; color:#8A8578; font-size:13px; margin-bottom:16px; }
  .frame { width:100%; max-width:1100px; height:640px; margin:0 auto; background:#FAFAF8; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.12); overflow:hidden; display:flex; }
  .sidebar { width:220px; flex-shrink:0; background:#fff; border-right:1px solid #EFEFEF; padding:24px 16px; box-sizing:border-box; }
  .brand { font-size:19px; font-weight:700; color:#1A1A1A; margin-bottom:28px; }
  .navitem { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px; font-size:14px; margin-bottom:4px; }
  .navitem.active { background:#FBF0E9; color:#C4703F; font-weight:600; }
  .navitem.inactive { color:#8A8578; }
  .navicon { width:16px; height:16px; border-radius:4px; }
  .main { flex:1; padding:28px 24px; box-sizing:border-box; display:flex; justify-content:center; }
  .col { width:100%; max-width:420px; }
  .coltitle { font-size:19px; font-weight:700; color:#1A1A1A; margin-bottom:16px; }
  .chips { display:flex; gap:8px; margin-bottom:16px; }
  .chip { border-radius:999px; padding:5px 12px; font-size:12px; }
  .chip.active { background:#C4703F; color:#fff; }
  .chip.inactive { background:#fff; border:1px solid #EFEFEF; color:#8A8578; }
  .card { background:#fff; border:1px solid #EFEFEF; border-radius:12px; padding:12px; }
  .row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .avatar { width:24px; height:24px; border-radius:50%; background:#C4703F; }
  .meta { font-size:13px; color:#8A8578; }
  .thumb { height:100px; border-radius:8px; background:#EDEBE0; margin-bottom:8px; }
  .cardtitle { font-size:17px; font-weight:600; color:#1A1A1A; margin-bottom:4px; }
  .note { font-size:13px; color:#C4703F; margin-bottom:8px; }
  .tags { display:flex; gap:6px; }
  .tag { background:#FAFAF8; color:#8A8578; border-radius:999px; padding:3px 10px; font-size:11px; }
</style>
</head>
<body>
<div class="caption">Web — Bookmarks &amp; tags, same sidebar shell as Feed</div>
<div class="frame">
  <div class="sidebar">
    <div class="brand">ThreadLink</div>
    <div class="navitem inactive"><div class="navicon" style="background:#EFEFEF;"></div>Feed</div>
    <div class="navitem active"><div class="navicon" style="background:#C4703F;"></div>Bookmarks</div>
    <div class="navitem inactive"><div class="navicon" style="background:#EFEFEF;"></div>Profile</div>
  </div>
  <div class="main">
    <div class="col">
      <div class="coltitle">Bookmarks</div>
      <div class="chips">
        <div class="chip active">Semua</div>
        <div class="chip inactive">musik</div>
        <div class="chip inactive">road trip</div>
      </div>
      <div class="card">
        <div class="row"><div class="avatar"></div><div class="meta">Ardi &middot; 2h</div></div>
        <div class="thumb"></div>
        <div class="cardtitle">Playlist jalan-jalan kita</div>
        <div class="note">"buat road trip sabtu nanti"</div>
        <div class="tags"><div class="tag">musik</div><div class="tag">road trip</div></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
