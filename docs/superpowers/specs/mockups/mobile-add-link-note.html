<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>ThreadLink — Mobile: Add Link + Note (Bottom Sheet)</title>
<style>
  body { margin:0; padding:40px; background:#F0F0EE; font-family:-apple-system,Helvetica,Arial,sans-serif; display:flex; justify-content:center; }
  .caption { text-align:center; color:#8A8578; font-size:13px; margin-bottom:16px; }
  .phone { width:390px; height:844px; background:rgba(26,26,26,0.35); border-radius:24px; box-shadow:0 8px 30px rgba(0,0,0,0.12); overflow:hidden; position:relative; }
  .sheet { position:absolute; bottom:0; left:0; right:0; background:#fff; border-radius:16px 16px 0 0; padding:12px 20px 32px; box-sizing:border-box; }
  .handle { width:36px; height:4px; border-radius:999px; background:#EFEFEF; margin:0 auto 14px; }
  .title { font-size:19px; font-weight:700; color:#1A1A1A; margin-bottom:14px; }
  .field { background:#FAFAF8; border:1px solid #EFEFEF; border-radius:12px; padding:10px 14px; margin-bottom:12px; }
  .fieldlabel { font-size:13px; color:#8A8578; margin-bottom:4px; }
  .fieldvalue { font-size:15px; color:#1A1A1A; }
  .savebtn { background:#C4703F; color:#fff; border-radius:999px; text-align:center; padding:12px; font-size:15px; font-weight:500; margin-top:4px; }
</style>
</head>
<body>
<div>
  <div class="caption">Mobile — Add link + note (bottom sheet). Not yet in Figma (hit MCP rate limit).</div>
  <div class="phone">
    <div class="sheet">
      <div class="handle"></div>
      <div class="title">Tambah link</div>
      <div class="field">
        <div class="fieldlabel">Link</div>
        <div class="fieldvalue">youtube.com/watch?v=roadtrip-mix</div>
      </div>
      <div class="field" style="min-height:60px;">
        <div class="fieldlabel">Catatan (opsional)</div>
        <div class="fieldvalue">buat road trip sabtu nanti</div>
      </div>
      <div class="savebtn">Simpan</div>
    </div>
  </div>
</div>
</body>
</html>
